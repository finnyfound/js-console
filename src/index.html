<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online JavaScript, HTML & CSS Playground and Formatter</title>
    <meta
      name="description"
      content="Run, beautify, and validate JavaScript, HTML, and CSS code instantly online. Test your code in real-time and improve workflow with formatting and debugging tools."
    />
    <meta name="author" content="Finny Kochummen" />
    <meta
      name="keywords"
      content="JavaScript playground, online formatter, HTML editor, CSS beautifier, run code online, JS validator, code beautify, web development tools"
    />
    <meta name="theme-color" content="#79c0ff" />
    <meta
      property="og:title"
      content="Online JavaScript, HTML & CSS Playground and Formatter"
    />
    <meta
      property="og:description"
      content="Run, beautify, and validate JavaScript, HTML, and CSS code instantly online. Test your code in real-time and improve workflow with formatting and debugging tools."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://console.jsformatter.net" />
    <meta
      property="og:image"
      content="https://console.jsformatter.net/favicon.png"
    />
    <meta
      name="google-site-verification"
      content="fCCdJBowsGDpT75rvmBfvE7D6pze1QFDps5hgNSkKl8"
    />
    <link rel="canonical" href="https://console.jsformatter.net" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Coding Fonts - Optimized for performance -->
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,400;0,500;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/editor/editor.main.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
  </head>
  <body>
    <div class="app-container">
      <header class="app-header">
        <h1>
          Online JavaScript, HTML & CSS Playground and Formatter |
          JSFormatter.net
        </h1>
        <div class="header-controls">
          <button
            id="emergency-stop"
            class="icon-btn danger emergency"
            style="display: none"
            title="Emergency Stop"
          >
            <i data-lucide="octagon-x"></i>
          </button>
          <button id="toggle-theme" class="icon-btn" title="Toggle Theme">
            <i data-lucide="moon"></i>
          </button>
        </div>
      </header>

      <div class="language-tabs">
        <div class="language-section">
          <div class="language-tab-buttons">
            <button class="language-tab active" data-language="javascript">
              <span class="tab-icon"><i data-lucide="zap"></i></span>
              <span class="tab-content">
                <span class="tab-filename">main.js</span>
                <span class="tab-language">JavaScript</span>
              </span>
            </button>
            <button class="language-tab" data-language="html">
              <span class="tab-icon"><i data-lucide="code"></i></span>
              <span class="tab-content">
                <span class="tab-filename">index.html</span>
                <span class="tab-language">HTML</span>
              </span>
            </button>
            <button class="language-tab" data-language="css">
              <span class="tab-icon"><i data-lucide="palette"></i></span>
              <span class="tab-content">
                <span class="tab-filename">style.css</span>
                <span class="tab-language">CSS</span>
              </span>
            </button>
          </div>
          <div class="editor-controls">
            <button
              id="run-code"
              class="icon-btn primary"
              title="Run Code (Ctrl+Enter)"
            >
              <i data-lucide="play"></i>
            </button>
            <button
              id="toggle-autorun"
              class="icon-btn"
              title="Toggle Auto-Run"
              data-state="off"
            >
              <i data-lucide="refresh-cw"></i>
            </button>
            <button id="format-code" class="icon-btn" title="Format Code">
              <i data-lucide="align-left"></i>
            </button>
          </div>
        </div>
        <div class="output-section-tabs">
          <div class="output-tabs">
            <button class="tab-button active" data-tab="console">
              <span class="tab-icon"><i data-lucide="terminal"></i></span>
              <span class="tab-content">
                <span class="tab-filename">console.log</span>
                <span class="tab-language">Console</span>
              </span>
            </button>
            <button class="tab-button" data-tab="render">
              <span class="tab-icon"><i data-lucide="monitor"></i></span>
              <span class="tab-content">
                <span class="tab-filename">preview.html</span>
                <span class="tab-language">Output</span>
              </span>
            </button>
          </div>
          <div class="output-controls">
            <button
              id="clear-console"
              class="icon-btn tab-clear-btn"
              title="Clear Console"
              data-tab-target="console"
            >
              <i data-lucide="trash-2"></i>
            </button>
            <button
              id="clear-render"
              class="icon-btn tab-clear-btn"
              title="Clear Output"
              data-tab-target="render"
              style="display: none"
            >
              <i data-lucide="eraser"></i>
            </button>
          </div>
        </div>
      </div>

      <main class="app-main">
        <div class="editor-section">
          <div id="monaco-editor" class="monaco-editor-container"></div>
        </div>

        <div class="output-section">
          <div id="console-output" class="output-panel active">
            <div class="console-content">
              <div id="console-log" class="console-log"></div>
            </div>
          </div>

          <div id="html-render" class="output-panel">
            <iframe
              id="render-frame"
              class="render-frame"
              sandbox="allow-scripts allow-same-origin allow-forms"
            ></iframe>
          </div>
        </div>
      </main>

      <div class="status-bar">
        <span id="status-text">Ready</span>
        <span id="execution-time"></span>
      </div>
    </div>

    <!-- Monaco Editor Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script>
      require.config({
        paths: {
          vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs',
        },
      });
    </script>

    <!-- Initialize Lucide Icons -->
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        // Check if Lucide is available
        if (typeof lucide !== 'undefined' && lucide.createIcons) {
          lucide.createIcons();
        } else {
          // Fallback: replace icon elements with text
          const icons = document.querySelectorAll('[data-lucide]');
          icons.forEach((icon) => {
            const iconName = icon.getAttribute('data-lucide');
            const fallbackText = {
              moon: '🌙',
              sun: '☀️',
              'octagon-x': '⛔',
              zap: '⚡',
              code: '📝',
              palette: '🎨',
              play: '▶️',
              'refresh-cw': '🔄',
              'align-left': '📐',
              terminal: '💻',
              monitor: '🖥️',
              'trash-2': '🗑️',
              eraser: '🧹',
            };
            icon.textContent = fallbackText[iconName] || '●';
          });
        }

        // Also listen for app initialization to update theme icon
        document.addEventListener('appInitialized', function () {
          if (typeof lucide !== 'undefined' && lucide.createIcons) {
            lucide.createIcons();
          }
        });
      });
    </script>

    <!-- Application Scripts -->
    <script type="module" src="js/main.js"></script>

    <script>
      // Only initialize Vercel Analytics in main window context, not in iframes
      if (window.self === window.top) {
        window.va =
          window.va ||
          function () {
            (window.vaq = window.vaq || []).push(arguments);
          };
      }
    </script>
    <script>
      // Only load Vercel Analytics script in main window context
      if (window.self === window.top) {
        var script = document.createElement('script');
        script.defer = true;
        script.src = '/_vercel/insights/script.js';
        document.head.appendChild(script);
      }
    </script>
  </body>
</html>
